<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPS.INTEL — Universal Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--font-head:'Syne',sans-serif;--font-mono:'IBM Plex Mono',monospace;
  --green:#00c47a;--green2:#008f58;--green-bg:#00c47a12;
  --red:#e8334a;--red2:#b8273b;--red-bg:#e8334a12;
  --amber:#d4891a;--amber2:#a86c12;--amber-bg:#d4891a12;
  --blue:#2b7fd4;--blue2:#1a63aa;--blue-bg:#2b7fd412;
  --purple:#7c5cbf;--purple-bg:#7c5cbf12;
}
:root,[data-theme="dark"]{
  --bg:#0a0c0f;--bg2:#111418;--bg3:#181c22;--bg4:#1e242c;
  --border:#ffffff0f;--border2:#ffffff1a;
  --text:#e8eaf0;--text2:#8b90a0;--text3:#555b6a;
  --shadow:0 2px 16px rgba(0,0,0,.5);
}
[data-theme="light"]{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f5f7fa;--bg4:#eaedf2;
  --border:#00000010;--border2:#00000018;
  --text:#1a1d24;--text2:#5a6070;--text3:#9aa0b0;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --green:#008f58;--green-bg:#008f5812;
  --red:#c4293d;--red-bg:#c4293d12;
  --amber:#b5730f;--amber-bg:#b5730f12;
  --blue:#1a63aa;--blue-bg:#1a63aa12;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;min-height:100vh;transition:background .25s,color .25s}
/* ── Topbar ── */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:10px;flex-wrap:wrap}
.logo{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--text);flex-shrink:0}
.logo span{color:var(--green)}
.logo sub{font-size:9px;color:var(--text3);font-weight:400;margin-right:4px}
.topbar-mid{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;justify-content:center}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.upload-pill{border:1.5px dashed var(--border2);border-radius:20px;padding:5px 14px;cursor:pointer;background:var(--bg3);display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);transition:all .2s;white-space:nowrap}
.upload-pill:hover,.upload-pill.loaded{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.upload-pill.prev.loaded{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.upload-pill input{display:none}
.status-wrap{display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.dot.live{background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.theme-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:3px;display:flex;gap:2px;cursor:pointer}
.theme-btn span{padding:3px 9px;border-radius:12px;font-size:10px;font-family:var(--font-head);font-weight:600;color:var(--text3);transition:all .2s;user-select:none}
.theme-btn span.on{background:var(--bg2);color:var(--text);box-shadow:var(--shadow)}
/* ── Main ── */
.main{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
/* ── Welcome ── */
.drop-zone{border:2px dashed var(--border2);border-radius:16px;padding:52px 32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;transition:all .25s;background:var(--bg2)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--green);background:var(--green-bg)}
.drop-zone h2{font-family:var(--font-head);font-size:20px;font-weight:700}
.drop-zone p{font-size:12px;color:var(--text2);max-width:400px;line-height:1.9}
.drop-zone input{display:none}
.drop-icon{font-size:44px;opacity:.7}
.btn-upload{background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-family:var(--font-head);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-upload:hover{background:var(--green2)}
/* ── Mapping UI ── */
.map-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.map-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.map-title{font-family:var(--font-head);font-size:13px;font-weight:700}
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:var(--border)}
.map-row{background:var(--bg2);padding:10px 14px;display:flex;align-items:center;gap:10px}
.map-field{font-size:11px;font-weight:500;color:var(--text);min-width:130px;flex-shrink:0}
.map-field sub{display:block;font-size:9px;color:var(--text3);font-weight:400;margin-top:1px}
.map-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:5px;font-size:11px;font-family:var(--font-mono);flex:1;cursor:pointer}
.map-select:focus{outline:none;border-color:var(--green)}
.map-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-family:var(--font-head);font-weight:600;flex-shrink:0}
.map-badge.auto{background:var(--green-bg);color:var(--green)}
.map-badge.manual{background:var(--amber-bg);color:var(--amber)}
.map-badge.miss{background:var(--red-bg);color:var(--red)}
.btn-analyze{background:var(--green);color:#fff;border:none;border-radius:7px;padding:8px 20px;font-family:var(--font-head);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-analyze:hover{background:var(--green2)}
.btn-analyze:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
/* ── Tabs ── */
.tab-bar{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:5px;font-size:11px;font-family:var(--font-head);font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:transparent;letter-spacing:.03em}
.tab.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.tab:hover:not(.active){color:var(--text);background:var(--bg3)}
/* ── KPIs ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:9px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:13px 15px;position:relative;overflow:hidden;transition:border-color .2s}
.kpi:hover{border-color:var(--border2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.g::before{background:var(--green)}.kpi.r::before{background:var(--red)}.kpi.a::before{background:var(--amber)}.kpi.b::before{background:var(--blue)}.kpi.p::before{background:var(--purple)}
.kpi-lbl{font-size:10px;color:var(--text3);margin-bottom:5px;letter-spacing:.03em}
.kpi-val{font-family:var(--font-head);font-size:21px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:10px;margin-top:4px}
.kpi-sub.up{color:var(--green)}.kpi-sub.dn{color:var(--red)}.kpi-sub.neu{color:var(--text3)}
/* ── Panels ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.ph{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.pt{font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--text);letter-spacing:.04em}
.pb{padding:13px 15px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* ── Bars ── */
.br{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:11px}
.br-l{width:88px;color:var(--text2);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
.br-t{flex:1;background:var(--bg4);border-radius:3px;height:6px;overflow:hidden}
.br-f{height:100%;border-radius:3px;transition:width .5s}
.br-v{width:40px;text-align:left;flex-shrink:0;font-weight:500;font-size:11px;color:var(--text)}
.br-d{width:38px;text-align:left;flex-shrink:0;font-size:10px}
/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{padding:7px 9px;text-align:right;color:var(--text3);border-bottom:1px solid var(--border);font-weight:500;font-family:var(--font-head);font-size:10px;letter-spacing:.03em;white-space:nowrap}
.tbl td{padding:7px 9px;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3);color:var(--text)}
/* ── Pills ── */
.pill{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;font-family:var(--font-head)}
.pill.g{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,196,122,.2)}
.pill.r{background:var(--red-bg);color:var(--red);border:1px solid rgba(232,51,74,.2)}
.pill.a{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(212,137,26,.2)}
.pill.b{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(43,127,212,.2)}
.pill.x{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
/* ── Alerts ── */
.alerts{display:flex;flex-direction:column}
.alert-row{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;transition:background .15s}
.alert-row:last-child{border-bottom:none}
.alert-row:hover{background:var(--bg3)}
.alert-badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;font-family:var(--font-head);white-space:nowrap;flex-shrink:0;margin-top:1px}
.alert-badge.r{background:var(--red-bg);color:var(--red);border:1px solid rgba(232,51,74,.2)}
.alert-badge.a{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(212,137,26,.2)}
.alert-badge.b{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(43,127,212,.2)}
.alert-title{font-weight:500;color:var(--text);margin-bottom:2px;font-size:12px}
.alert-desc{color:var(--text2);font-size:11px;line-height:1.5}
/* ── Seg bar ── */
.seg-bar{display:flex;height:16px;border-radius:3px;overflow:hidden;gap:1px;margin:7px 0}
.seg-p{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;overflow:hidden;font-family:var(--font-head)}
.seg-leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.seg-i{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.seg-d{width:7px;height:7px;border-radius:2px}
/* ── Filters ── */
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.fi{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:6px;font-size:11px;font-family:var(--font-mono)}
.fi:focus{outline:none;border-color:var(--green)}
.fi.inp{flex:1;min-width:180px}
.scroll-x{overflow-x:auto}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:12px;line-height:2}
.g-txt{color:var(--green)}.r-txt{color:var(--red)}.a-txt{color:var(--amber)}.b-txt{color:var(--blue)}
.compare-badge{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--blue-bg);color:var(--blue);border:1px solid rgba(43,127,212,.25);font-family:var(--font-head);font-weight:600}
.info-chip{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
@media(max-width:600px){.two,.three{grid-template-columns:1fr}.topbar{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">OPS<span>.</span>INTEL <sub>Universal</sub></div>
  <div class="topbar-mid">
    <label class="upload-pill" id="lbl-curr">
      <input type="file" id="f-curr" accept=".xlsx,.xls,.csv">
      <span id="ic-curr">📊</span><span id="tx-curr">رفع الملف الحالي</span>
    </label>
    <label class="upload-pill prev" id="lbl-prev">
      <input type="file" id="f-prev" accept=".xlsx,.xls,.csv">
      <span id="ic-prev">📅</span><span id="tx-prev">مقارنة بالفترة السابقة</span>
    </label>
  </div>
  <div class="topbar-right">
    <div class="status-wrap"><div class="dot" id="sdot"></div><span style="font-size:10px;color:var(--text2)" id="slbl">بانتظار ملف</span></div>
    <div class="theme-btn" onclick="toggleTheme()"><span id="td">☀️</span><span id="tn" class="on">🌙</span></div>
  </div>
</div>
<div class="main" id="main"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currRaw=null,prevRaw=null,currMap=null,prevMap=null;
let currAgg=null,prevAgg=null;
let activeTab='overview';
let isDark=true;

// ══════════════════════════════════════════════
//  COLUMN DETECTION ENGINE
// ══════════════════════════════════════════════
const FIELDS = [
  { key:'id',       label:'معرّف الكابتن / المتجر', desc:'captain_id / rider_id / store',
    keywords:['captain_id','rider_id','driver_id','cap_id','rider','captain','driver','id','كابتن','سائق','معرف','store_code','store','متجر','فرع'] },
  { key:'name',     label:'الاسم', desc:'name / full_name',
    keywords:['name','full_name','captain_name','rider_name','driver_name','اسم','الاسم'] },
  { key:'city',     label:'المدينة / المنطقة', desc:'city / zone',
    keywords:['city','city_code','zone','region','area','مدينة','منطقة','city_name'] },
  { key:'store',    label:'المتجر / الفرع', desc:'store_code / branch',
    keywords:['store_code','store','branch','فرع','متجر','store_name','hub'] },
  { key:'date',     label:'التاريخ / اليوم', desc:'day / date',
    keywords:['day','date','تاريخ','يوم','datetime','created_at','period'] },
  { key:'orders',   label:'إجمالي الطلبات', desc:'total_orders / orders',
    keywords:['total_orders','orders','order_count','num_orders','طلبات','الطلبات','deliveries','trips'] },
  { key:'perf',     label:'الأداء / الإنتاجية', desc:'performance / score',
    keywords:['performance','performnce','perf','score','productivity','rating','أداء','إنتاجية','kpi'] },
  { key:'pickup_pct', label:'نسبة الاستلام', desc:'pickup_success_pct',
    keywords:['pickup_success','pickup_pct','on_time_pickup','pickup_rate','استلام','نسبة_استلام','acceptance'] },
  { key:'del_pct',  label:'نسبة التوصيل', desc:'delivery_success_rate_pct',
    keywords:['delivery_success','delivery_pct','delivery_rate','on_time_delivery','توصيل','نسبة_توصيل','completion_rate','completion'] },
  { key:'delay',    label:'متوسط التأخير (دقيقة)', desc:'avg_delay_min',
    keywords:['avg_delay','delay','late','delay_min','تأخير','وقت_تأخير','lateness','avg_late'] },
  { key:'max_delay',label:'أقصى تأخير', desc:'max_delay_min',
    keywords:['max_delay','max_late','max_delay_min','أقصى_تأخير'] },
  { key:'cancel',   label:'الإلغاء', desc:'cancellation / cancel_rate',
    keywords:['cancel','cancellation','cancelled','cancel_rate','إلغاء','ملغي','rejected'] },
  { key:'bad',      label:'الأيام السيئة', desc:'bad_days',
    keywords:['bad_days','bad_day','poor_days','أيام_سيئة','سيئة'] },
  { key:'handling', label:'وقت التعامل مع العميل', desc:'avg_customer_handling_min',
    keywords:['handling','customer_handling','handle_time','وقت_العميل','handling_min','service_time'] },
  { key:'country',  label:'الدولة', desc:'country_code',
    keywords:['country','country_code','دولة','الدولة'] },
];

function detectMap(headers){
  const map={};
  const used=new Set();
  const hLower=headers.map(h=>({orig:h,low:(h||'').toString().toLowerCase().replace(/[^a-z0-9أ-ي_]/g,'')}));
  FIELDS.forEach(f=>{
    let best=null,bestScore=0;
    hLower.forEach(h=>{
      if(used.has(h.orig))return;
      f.keywords.forEach(kw=>{
        const kwL=kw.toLowerCase();
        let score=0;
        if(h.low===kwL)score=100;
        else if(h.low.includes(kwL)||kwL.includes(h.low))score=60;
        else{
          // partial overlap
          const overlap=[...kwL].filter(c=>h.low.includes(c)).length;
          score=overlap/Math.max(kwL.length,h.low.length)*40;
        }
        if(score>bestScore){bestScore=score;best=h.orig;}
      });
    });
    if(best&&bestScore>=40){map[f.key]={col:best,auto:bestScore>=60};used.add(best);}
    else{map[f.key]={col:'',auto:false};}
  });
  return map;
}

// ══════════════════════════════════════════════
//  FILE PARSER
// ══════════════════════════════════════════════
function parseFile(file,cb){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{defval:''});
      const headers=raw.length?Object.keys(raw[0]):[];
      cb({raw,headers,name:file.name});
    }catch(ex){alert('خطأ في قراءة الملف:\n'+ex.message);}
  };
  reader.readAsArrayBuffer(file);
}

// ══════════════════════════════════════════════
//  DATA EXTRACTOR — uses mapping to normalize rows
// ══════════════════════════════════════════════
function extractRows(raw,map){
  return raw.map(r=>{
    const g=(key)=>{const col=map[key]&&map[key].col?map[key].col:'';return col?r[col]:undefined;};
    const gn=(key)=>{const v=g(key);return v===undefined||v===''?null:+v||0;};
    const gs=(key)=>{const v=g(key);return v===undefined?'':String(v||'').trim();};
    // smart performance: if value > 1 assume it's percentage already
    let perf=gn('perf');
    if(perf!==null&&perf>1)perf=perf/100;
    let pickup=gn('pickup_pct');
    if(pickup!==null&&pickup>1)pickup=pickup/100;
    let del=gn('del_pct');
    if(del!==null&&del>1)del=del/100;
    return{
      id:gs('id')||gs('store'),
      name:gs('name'),
      city:gs('city'),
      store:gs('store'),
      date:gs('date'),
      orders:gn('orders')||0,
      perf:perf,
      pickup_pct:pickup,
      del_pct:del,
      delay:gn('delay'),
      max_delay:gn('max_delay'),
      cancel:gn('cancel'),
      bad:gn('bad')!==null?+gn('bad').toFixed(2):null,
      handling:gn('handling'),
      country:gs('country'),
    };
  }).filter(r=>r.orders>0||r.perf!==null||r.id);
}

// ══════════════════════════════════════════════
//  AGGREGATOR
// ══════════════════════════════════════════════
function buildAgg(rows,map){
  const n=rows.length;
  if(!n)return null;
  const has=key=>rows.some(r=>r[key]!==null&&r[key]!==undefined&&r[key]!=='');
  const avg=(key)=>{const v=rows.filter(r=>r[key]!==null&&r[key]!==undefined);return v.length?v.reduce((s,r)=>s+r[key],0)/v.length:null;};
  const wavg=(key,wkey)=>{
    const v=rows.filter(r=>r[key]!==null&&r[key]!==undefined&&r[wkey]>0);
    if(!v.length)return null;
    const tw=v.reduce((s,r)=>s+r[wkey],0);
    return tw?v.reduce((s,r)=>s+(r[key]*r[wkey]),0)/tw:null;
  };
  const sum=key=>rows.reduce((s,r)=>s+(r[key]||0),0);

  // weighted performance by orders if orders available
  const hasOrders=has('orders')&&sum('orders')>0;
  const avgPerf=hasOrders?wavg('perf','orders'):avg('perf');
  const avgDel=hasOrders?wavg('del_pct','orders'):avg('del_pct');
  const avgPickup=hasOrders?wavg('pickup_pct','orders'):avg('pickup_pct');

  const totOrders=sum('orders');
  const avgDelay=avg('delay');
  const avgBad=avg('bad');
  const avgCancel=avg('cancel');
  const avgHandling=avg('handling');

  // segments
  const perfRows=rows.filter(r=>r.perf!==null);
  const segs=perfRows.length?{
    critical:perfRows.filter(r=>r.perf<0.33).length,
    poor:perfRows.filter(r=>r.perf>=0.33&&r.perf<0.5).length,
    avg:perfRows.filter(r=>r.perf>=0.5&&r.perf<0.7).length,
    good:perfRows.filter(r=>r.perf>=0.7&&r.perf<0.85).length,
    elite:perfRows.filter(r=>r.perf>=0.85).length,
  }:null;

  // group by city
  const byCity={};
  rows.forEach(r=>{
    const k=r.city||'غير محدد';
    if(!byCity[k])byCity[k]={key:k,n:0,orders:0,pSum:0,pN:0,dSum:0,dN:0,delSum:0,delN:0,bad:0,badN:0};
    const c=byCity[k];c.n++;c.orders+=r.orders||0;
    if(r.perf!==null){c.pSum+=r.perf*(r.orders||1);c.pN+=r.orders||1;}
    if(r.del_pct!==null){c.dSum+=r.del_pct*(r.orders||1);c.dN+=r.orders||1;}
    if(r.delay!==null){c.delSum+=r.delay;c.delN++;}
    if(r.bad!==null){c.bad+=r.bad;c.badN++;}
  });
  const cities=Object.values(byCity).map(c=>({
    city:c.key,n:c.n,orders:c.orders,
    perf:c.pN?+(c.pSum/c.pN).toFixed(4):null,
    del:c.dN?+(c.dSum/c.dN).toFixed(4):null,
    delay:c.delN?+(c.delSum/c.delN).toFixed(2):null,
    bad:c.badN?+(c.bad/c.badN).toFixed(2):null,
  })).filter(c=>c.perf!==null||c.orders>0).sort((a,b)=>(b.perf||0)-(a.perf||0));

  // group by store
  const byStore={};
  rows.forEach(r=>{
    const k=r.store||r.id||'غير محدد';
    if(!byStore[k])byStore[k]={key:k,n:0,orders:0,pSum:0,pN:0,dSum:0,dN:0,delSum:0,delN:0,bad:0,badN:0};
    const s=byStore[k];s.n++;s.orders+=r.orders||0;
    if(r.perf!==null){s.pSum+=r.perf*(r.orders||1);s.pN+=r.orders||1;}
    if(r.del_pct!==null){s.dSum+=r.del_pct*(r.orders||1);s.dN+=r.orders||1;}
    if(r.delay!==null){s.delSum+=r.delay;s.delN++;}
    if(r.bad!==null){s.bad+=r.bad;s.badN++;}
  });
  const stores=Object.values(byStore).map(s=>({
    store:s.key,n:s.n,orders:s.orders,
    perf:s.pN?+(s.pSum/s.pN).toFixed(4):null,
    del:s.dN?+(s.dSum/s.dN).toFixed(4):null,
    delay:s.delN?+(s.delSum/s.delN).toFixed(2):null,
    bad:s.badN?+(s.bad/s.badN).toFixed(2):null,
  })).filter(s=>s.perf!==null||s.orders>0).sort((a,b)=>(b.perf||0)-(a.perf||0));

  // fraud signals
  const fraud1=rows.filter(r=>r.pickup_pct>=0.8&&r.del_pct===0&&r.orders>=5).length;
  const fraud2=rows.filter(r=>r.handling!==null&&r.handling<0.5&&r.orders>=5).length;
  const zeroDel=rows.filter(r=>r.del_pct===0).length;
  const elite=rows.filter(r=>r.perf!==null&&r.perf>0.85&&r.orders>=10).length;
  const critical=rows.filter(r=>r.perf!==null&&r.perf<0.1&&r.orders>=3).length;
  const highBad=rows.filter(r=>r.bad!==null&&r.bad>=5).length;
  const maxDelay=Math.max(0,...rows.filter(r=>r.max_delay!==null).map(r=>r.max_delay));

  // auto alerts
  const alerts=[];
  if(avgPerf!==null&&avgPerf<0.5)alerts.push({type:'r',code:'PERF-LOW',title:`متوسط الأداء منخفض جداً: ${pct(avgPerf)}`,desc:'الهدف يجب أن يكون فوق 70%. يحتاج تدخلاً تشغيلياً عاجلاً.'});
  if(avgDel!==null&&avgDel<0.5)alerts.push({type:'r',code:'DEL-LOW',title:`نسبة التوصيل الناجح: ${pct(avgDel)}`,desc:'أقل من النصف — مشكلة هيكلية في آخر ميل.'});
  if(fraud1>0)alerts.push({type:'r',code:'FRAUD-1',title:`${fraud1} سجل: استلام عالي + صفر توصيل`,desc:'احتمال تلاعب ممنهج — يجب مراجعة فورية.'});
  if(fraud2>0)alerts.push({type:'a',code:'FRAUD-2',title:`${fraud2} سجل: وقت تعامل مع العميل أقل من 30 ثانية`,desc:'توصيل وهمي محتمل.'});
  if(zeroDel>0)alerts.push({type:'a',code:'ZERO-DEL',title:`${zeroDel} سجل بصفر توصيل ناجح`,desc:'يشمل '+(rows.filter(r=>r.del_pct===0).reduce((s,r)=>s+(r.orders||0),0))+' طلب ضائع.'});
  if(highBad>0)alerts.push({type:'a',code:'BAD-DAYS',title:`${highBad} سجل بـ 5+ أيام سيئة`,desc:'أداء سيئ متكرر — تدريب أو إجراء تأديبي.'});
  if(critical>0)alerts.push({type:'r',code:'CRIT-ZERO',title:`${critical} سجل بأداء أقل من 10%`,desc:'غياب تشغيلي كامل — تجميد فوري.'});
  if(maxDelay>90)alerts.push({type:'a',code:'MAX-DELAY',title:`أقصى تأخير مسجل: ${maxDelay.toFixed(0)} دقيقة`,desc:'يجب مراجعة مسار GPS لتلك الرحلة.'});
  if(avgCancel!==null&&avgCancel>0.1)alerts.push({type:'a',code:'CANCEL',title:`معدل إلغاء مرتفع: ${pct(avgCancel)}`,desc:'فوق 10% — يؤثر على رضا العميل.'});
  if(!alerts.length)alerts.push({type:'b',code:'OK',title:'لا تنبيهات حرجة مكتشفة',desc:'المؤشرات ضمن الحدود المقبولة بناءً على البيانات المتاحة.'});

  // suggestions
  const suggestions=[];
  if(avgPerf!==null&&avgPerf<0.6)suggestions.push('تطبيق برنامج Coaching فوري للشريحة 33-60%');
  if(fraud1>5)suggestions.push('مراجعة الـ '+fraud1+' كابتن بنمط FRAUD-1 وتجميد مؤقت');
  if(zeroDel>rows.length*0.1)suggestions.push('تفعيل نظام تحقق ثنائي عند عدم تسجيل توصيل');
  if(avgDelay!==null&&avgDelay>10)suggestions.push('مراجعة مناطق التأخير الجغرافية وتقليل المسافات في الـ Dispatch');
  if(elite<rows.length*0.05)suggestions.push('برنامج تحفيزي لكباتن النخبة لرفع نسبتهم');
  if(avgCancel!==null&&avgCancel>0.1)suggestions.push('تحليل أسباب الإلغاء ومعالجة الـ Root Cause');

  const uniqueCities=new Set(rows.map(r=>r.city||'')).size;
  const uniqueStores=new Set(rows.map(r=>r.store||r.id||'')).size;

  return{n,totOrders,avgPerf,avgDel,avgPickup,avgDelay,avgBad,avgCancel,avgHandling,
    zeroDel,elite,critical,highBad,fraud1,fraud2,maxDelay,segs,
    cities,stores,raw:rows,alerts,suggestions,
    uniqueCities,uniqueStores,has,map,
    hasPerf:has('perf'),hasOrders:has('orders'),hasDel:has('del_pct'),
    hasPickup:has('pickup_pct'),hasDelay:has('delay'),hasBad:has('bad'),
    hasCancel:has('cancel'),hasHandling:has('handling'),
  };
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function pct(v){return v===null||v===undefined?'—':(v*100).toFixed(1)+'%'}
function fmtN(v){return v>=1000?(v/1000).toFixed(1)+'K':v}
function pc(v){if(v===null)return'var(--text3)';if(v>=0.85)return'var(--green)';if(v>=0.7)return'var(--blue)';if(v>=0.5)return'var(--amber)';return'var(--red)';}
function pp(v){if(v===null)return'x';if(v>=0.85)return'g';if(v>=0.7)return'b';if(v>=0.5)return'a';return'r';}
function dH(curr,prev,better){
  if(prev===null||prev===undefined||curr===null)return'';
  const d=curr-prev;if(Math.abs(d)<0.0001)return'<span class="kpi-sub neu">— بلا تغيير</span>';
  const up=d>0;const good=better==='up'?up:!up;
  return`<span class="kpi-sub ${good?'up':'dn'}">${up?'▲':'▼'} ${(Math.abs(d/Math.abs(prev))*100).toFixed(1)}%</span>`;
}

function renderMapUI(fileInfo, which){
  const map=detectMap(fileInfo.headers);
  const optionsHtml='<option value="">— لا يوجد —</option>'+fileInfo.headers.map(h=>`<option value="${h}">${h}</option>`).join('');
  const autoCount=FIELDS.filter(f=>map[f.key]&&map[f.key].auto).length;
  const main=document.getElementById('main');
  main.innerHTML=`
  <div class="map-card">
    <div class="map-head">
      <div>
        <span class="pt">🔍 ربط الأعمدة التلقائي</span>
        <span style="font-size:11px;color:var(--text2);margin-right:10px">الملف: <strong style="color:var(--text)">${fileInfo.name}</strong> — ${fileInfo.raw.length} صف — ${fileInfo.headers.length} عمود</span>
      </div>
      <span class="info-chip">تم اكتشاف ${autoCount}/${FIELDS.length} تلقائياً</span>
    </div>
    <div class="map-grid" id="map-grid">
      ${FIELDS.map(f=>{
        const m=map[f.key];
        const hasCol=m&&m.col;
        return`<div class="map-row">
          <div class="map-field">${f.label}<sub>${f.desc}</sub></div>
          <select class="map-select" id="ms-${f.key}" onchange="onMapChange()">
            ${optionsHtml.replace(`value="${hasCol?m.col:''}"`,`value="${hasCol?m.col:''}" selected`)}
          </select>
          <span class="map-badge ${hasCol?(m.auto?'auto':'manual'):'miss'}" id="mb-${f.key}">${hasCol?(m.auto?'تلقائي':'يدوي'):'غير موجود'}</span>
        </div>`;
      }).join('')}
    </div>
    <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--text2)">راجع الربط وعدّل أي عمود يدوياً ثم اضغط تحليل</span>
      <button class="btn-analyze" onclick="confirmMap('${which}')">⚡ تحليل البيانات</button>
    </div>
  </div>`;
  // store for later
  window._pendingFile={fileInfo,which};
  // set selects to detected values
  FIELDS.forEach(f=>{
    const sel=document.getElementById('ms-'+f.key);
    const m=map[f.key];
    if(sel&&m&&m.col)sel.value=m.col;
  });
}

window.onMapChange=function(){
  FIELDS.forEach(f=>{
    const sel=document.getElementById('ms-'+f.key);
    const badge=document.getElementById('mb-'+f.key);
    if(!sel||!badge)return;
    const v=sel.value;
    if(v){badge.textContent='يدوي';badge.className='map-badge manual';}
    else{badge.textContent='غير موجود';badge.className='map-badge miss';}
  });
};

window.confirmMap=function(which){
  const map={};
  FIELDS.forEach(f=>{
    const sel=document.getElementById('ms-'+f.key);
    map[f.key]={col:sel?sel.value:'',auto:false};
  });
  const {fileInfo}=window._pendingFile;
  const rows=extractRows(fileInfo.raw,map);
  if(which==='curr'){
    currRaw=fileInfo.raw;currMap=map;currAgg=buildAgg(rows,map);
    document.getElementById('ic-curr').textContent='✅';
    document.getElementById('tx-curr').textContent=fileInfo.name.substring(0,20);
    document.getElementById('lbl-curr').classList.add('loaded');
  } else {
    prevRaw=fileInfo.raw;prevMap=map;prevAgg=buildAgg(rows,map);
    document.getElementById('ic-prev').textContent='✅';
    document.getElementById('tx-prev').textContent=fileInfo.name.substring(0,20);
    document.getElementById('lbl-prev').classList.add('loaded');
  }
  document.getElementById('sdot').className='dot live';
  document.getElementById('slbl').textContent=(currAgg?currAgg.n+' سجل':'')+( prevAgg?' | مقارنة مفعّلة':'');
  activeTab='overview';
  renderDash();
};

function renderDash(){
  const c=currAgg,p=prevAgg;
  if(!c){renderWelcome();return;}
  const tabs=[
    {k:'overview',l:'لمحة عامة'},
    {k:'cities',l:'المدن'},
    {k:'stores',l:'المتاجر'},
    {k:'entities',l:'أداء الكباتن'},
    {k:'alerts',l:'🚨 التنبيهات'+(c.alerts.filter(a=>a.type==='r').length?` (${c.alerts.filter(a=>a.type==='r').length})`:'')},
    {k:'compare',l:'المقارنة'+(p?' <span class="compare-badge">ON</span>':'')}
  ];
  const tabBar=`<div class="tab-bar">${tabs.map(t=>`<button class="tab${t.k===activeTab?' active':''}" onclick="sw('${t.k}')">${t.l}</button>`).join('')}</div>`;
  let body='';

  if(activeTab==='overview') body=renderOverview(c,p);
  else if(activeTab==='cities') body=renderCities(c,p);
  else if(activeTab==='stores') body=renderStores(c,p);
  else if(activeTab==='entities') body=renderEntities(c);
  else if(activeTab==='alerts') body=renderAlerts(c);
  else if(activeTab==='compare') body=renderCompare(c,p);

  document.getElementById('main').innerHTML=tabBar+body;
  if(activeTab==='entities')filterEnts();
}

function renderOverview(c,p){
  const kpis=[];
  if(c.totOrders>0)kpis.push({l:'إجمالي السجلات / الطلبات',v:fmtN(c.totOrders)||c.n,cl:'b',d:dH(c.totOrders,p?p.totOrders:null,'up')});
  else kpis.push({l:'إجمالي السجلات',v:c.n,cl:'b',d:''});
  if(c.hasPerf)kpis.push({l:'متوسط الأداء (Weighted)',v:pct(c.avgPerf),cl:c.avgPerf>=0.7?'g':c.avgPerf>=0.5?'a':'r',d:dH(c.avgPerf,p?p.avgPerf:null,'up')});
  if(c.hasDel)kpis.push({l:'التوصيل الناجح',v:pct(c.avgDel),cl:c.avgDel>=0.7?'g':c.avgDel>=0.5?'a':'r',d:dH(c.avgDel,p?p.avgDel:null,'up')});
  if(c.hasPickup)kpis.push({l:'الاستلام الناجح',v:pct(c.avgPickup),cl:c.avgPickup>=0.7?'g':c.avgPickup>=0.5?'a':'r',d:dH(c.avgPickup,p?p.avgPickup:null,'up')});
  if(c.hasDelay)kpis.push({l:'متوسط التأخير',v:c.avgDelay!==null?c.avgDelay.toFixed(1)+' دق':'—',cl:c.avgDelay<=5?'g':c.avgDelay<=10?'a':'r',d:dH(c.avgDelay,p?p.avgDelay:null,'dn')});
  if(c.hasBad)kpis.push({l:'الأيام السيئة',v:c.avgBad!==null?c.avgBad.toFixed(2):'—',cl:c.avgBad<=1?'g':c.avgBad<=2?'a':'r',d:dH(c.avgBad,p?p.avgBad:null,'dn')});
  if(c.hasDel&&c.zeroDel>0)kpis.push({l:'سجلات بصفر توصيل',v:c.zeroDel,cl:'r',d:dH(c.zeroDel,p?p.zeroDel:null,'dn')});
  if(c.hasPerf)kpis.push({l:'كباتن النخبة (>85%)',v:c.elite,cl:'g',d:dH(c.elite,p?p.elite:null,'up')});
  if(c.hasPerf&&c.critical>0)kpis.push({l:'أداء بالغ الخطورة (<10%)',v:c.critical,cl:'r',d:dH(c.critical,p?p.critical:null,'dn')});
  if(c.hasBad&&c.highBad>0)kpis.push({l:'5+ أيام سيئة',v:c.highBad,cl:'a',d:''});
  if(c.hasCancel)kpis.push({l:'معدل الإلغاء',v:pct(c.avgCancel),cl:c.avgCancel<0.05?'g':c.avgCancel<0.1?'a':'r',d:dH(c.avgCancel,p?p.avgCancel:null,'dn')});
  if(c.hasHandling)kpis.push({l:'متوسط وقت العميل',v:c.avgHandling!==null?c.avgHandling.toFixed(1)+' دق':'—',cl:'b',d:''});

  let out=`<div class="kpi-grid">${kpis.map(k=>`<div class="kpi ${k.cl}"><div class="kpi-lbl">${k.l}</div><div class="kpi-val">${k.v}</div>${k.d}</div>`).join('')}</div>`;

  // segments
  if(c.segs){
    const total=Object.values(c.segs).reduce((s,v)=>s+v,0);
    out+=`<div class="panel" style="margin-top:12px"><div class="ph"><span class="pt">توزيع شرائح الأداء</span><span style="font-size:11px;color:var(--text3)">${c.n} سجل</span></div><div class="pb">
    <div class="seg-bar">
      ${[{k:'critical',c:'#e8334a'},{k:'poor',c:'#d4891a'},{k:'avg',c:'#555b6a'},{k:'good',c:'#2b7fd4'},{k:'elite',c:'#00c47a'}].map(s=>{const w=(c.segs[s.k]/total*100).toFixed(1);return`<div class="seg-p" style="flex:${w};background:${s.c}22;border:1px solid ${s.c}44;color:${s.c}">${w>4?c.segs[s.k]:''}</div>`;}).join('')}
    </div>
    <div class="seg-leg">
      ${[{k:'critical',c:'#e8334a',l:'خطورة <33%'},{k:'poor',c:'#d4891a',l:'ضعيف 33-50%'},{k:'avg',c:'#555b6a',l:'متوسط 50-70%'},{k:'good',c:'#2b7fd4',l:'جيد 70-85%'},{k:'elite',c:'#00c47a',l:'نخبة >85%'}].map(s=>`<div class="seg-i"><div class="seg-d" style="background:${s.c}"></div>${s.l}: <strong style="color:var(--text)">${c.segs[s.k]}</strong></div>`).join('')}
    </div></div></div>`;
  }

  // top/bottom bars
  const hasCities=c.cities.length>1;
  const hasStores=c.stores.length>1;
  if(hasCities||hasStores){
    out+=`<div class="${hasCities&&hasStores?'two':'three'}" style="margin-top:12px">`;
    if(hasCities){
      out+=`<div class="panel"><div class="ph"><span class="pt">🏆 أفضل مدن</span></div><div class="pb">
        ${c.cities.slice(0,6).map(ci=>`<div class="br"><span class="br-l" title="${ci.city}">${ci.city}</span><div class="br-t"><div class="br-f" style="width:${ci.perf!==null?(ci.perf*100).toFixed(0):'0'}%;background:${pc(ci.perf)}"></div></div><span class="br-v">${pct(ci.perf)}</span></div>`).join('')}
      </div></div>
      <div class="panel"><div class="ph"><span class="pt">🔴 أسوأ مدن</span></div><div class="pb">
        ${[...c.cities].sort((a,b)=>(a.perf||0)-(b.perf||0)).slice(0,6).map(ci=>`<div class="br"><span class="br-l" title="${ci.city}">${ci.city}</span><div class="br-t"><div class="br-f" style="width:${ci.perf!==null?(ci.perf*100).toFixed(0):'0'}%;background:${pc(ci.perf)}"></div></div><span class="br-v">${pct(ci.perf)}</span></div>`).join('')}
      </div></div>`;
    }
    if(hasStores){
      out+=`<div class="panel"><div class="ph"><span class="pt">🏪 أفضل متاجر</span></div><div class="pb">
        ${c.stores.slice(0,6).map(s=>`<div class="br"><span class="br-l" style="font-size:9px" title="${s.store}">${s.store}</span><div class="br-t"><div class="br-f" style="width:${s.perf!==null?(s.perf*100).toFixed(0):'0'}%;background:${pc(s.perf)}"></div></div><span class="br-v">${pct(s.perf)}</span></div>`).join('')}
      </div></div>
      <div class="panel"><div class="ph"><span class="pt">🚨 أسوأ متاجر</span></div><div class="pb">
        ${[...c.stores].sort((a,b)=>(a.perf||0)-(b.perf||0)).slice(0,6).map(s=>`<div class="br"><span class="br-l" style="font-size:9px" title="${s.store}">${s.store}</span><div class="br-t"><div class="br-f" style="width:${s.perf!==null?(s.perf*100).toFixed(0):'0'}%;background:${pc(s.perf)}"></div></div><span class="br-v">${pct(s.perf)}</span></div>`).join('')}
      </div></div>`;
    }
    out+='</div>';
  }

  // suggestions
  if(c.suggestions.length){
    out+=`<div class="panel" style="margin-top:12px"><div class="ph"><span class="pt">💡 اقتراحات تحسين تلقائية</span></div><div class="alerts">
      ${c.suggestions.map((s,i)=>`<div class="alert-row"><span class="alert-badge b">#${i+1}</span><div><div class="alert-desc">${s}</div></div></div>`).join('')}
    </div></div>`;
  }
  return out;
}

function renderCities(c,p){
  const pm={};if(p)p.cities.forEach(ci=>pm[ci.city]=ci);
  const cols=[];
  if(c.hasPerf)cols.push({k:'perf',l:'الأداء'});
  if(c.hasDel)cols.push({k:'del',l:'التوصيل'});
  if(c.hasDelay)cols.push({k:'delay',l:'التأخير'});
  if(c.hasBad)cols.push({k:'bad',l:'أيام سيئة'});
  return`<div class="panel"><div class="ph"><span class="pt">أداء المدن (${c.cities.length})</span>${p?'<span class="compare-badge">مقارنة ON</span>':''}</div>
  <div class="scroll-x"><table class="tbl"><thead><tr>
    <th>المدينة</th><th>سجلات</th><th>طلبات</th>
    ${cols.map(col=>`<th>${col.l}</th>${p?`<th>Δ ${col.l}</th>`:''}`).join('')}<th>الحالة</th>
  </tr></thead><tbody>
  ${c.cities.map(ci=>{
    const prev=pm[ci.city];
    return`<tr><td style="font-weight:600;color:var(--text)">${ci.city}</td><td>${ci.n}</td><td>${ci.orders||'—'}</td>
    ${cols.map(col=>{
      const v=ci[col.k];const pv=prev?prev[col.k]:null;
      const d=pv!==null&&v!==null?v-pv:null;
      const fmt=col.k==='delay'||col.k==='bad'?(v!==null?v.toFixed(2)+'':' —'):pct(v);
      const cl=col.k==='perf'||col.k==='del'?pp(v):'';
      return`<td>${cl?`<span class="pill ${cl}">${fmt}</span>`:fmt}</td>${p?`<td class="${d===null?'':d>0?(col.k==='delay'||col.k==='bad'?'r-txt':'g-txt'):(col.k==='delay'||col.k==='bad'?'g-txt':'r-txt')}">${d===null?'—':(d>0?'▲':'▼')+( col.k==='delay'||col.k==='bad'?Math.abs(d).toFixed(2):pct(Math.abs(d)))}</td>`:''}`
    }).join('')}
    <td>${ci.perf>=0.7?'<span class="pill g">جيد</span>':ci.perf>=0.5?'<span class="pill a">متوسط</span>':ci.perf!==null?'<span class="pill r">تدخل</span>':'<span class="pill x">—</span>'}</td>
    </tr>`;
  }).join('')}
  </tbody></table></div></div>`;
}

  if(c.has('name'))cols.push({k:'name',l:'الاسم'});

  if(c.has('store'))cols.push({k:'store',l:'المتجر'});

    ${stores.length>1?`<select class="fi" id="est" onchange="filterEnts()"><option value="">كل المتاجر</option>${stores.map(s=>`<option>${s}</option>`).join('')}</select>`:''}

    <select class="fi" id="esort" onchange="filterEnts()">

window.onECityChange=function(){
  if(!currAgg)return;
  const city=(document.getElementById('ecy')||{}).value||'';
  const stEl=document.getElementById('est');
  if(stEl){
    const stores=city?[...new Set(currAgg.raw.filter(r=>r.city===city).map(r=>r.store||''))].sort():[...new Set(currAgg.raw.map(r=>r.store||''))].sort();
    stEl.innerHTML='<option value="">كل المتاجر</option>'+stores.filter(s=>s).map(s=>`<option>${s}</option>`).join('');
  }
  filterEnts();
};

window.filterEnts=function(){
  if(!currAgg)return;
  const c=currAgg;
  const q=(document.getElementById('eq')||{}).value||'';
  const city=(document.getElementById('ecy')||{}).value||'';
  const store=(document.getElementById('est')||{}).value||'';
  const seg=(document.getElementById('eseg')||{}).value||'';
  const sort=(document.getElementById('esort')||{}).value||'';
  let rows=[...c.raw];
  if(q)rows=rows.filter(r=>String(r.id||'').includes(q)||(r.name||'').toLowerCase().includes(q.toLowerCase())||(r.store||'').toLowerCase().includes(q.toLowerCase()));
  if(city)rows=rows.filter(r=>r.city===city);
  if(store)rows=rows.filter(r=>r.store===store);
  if(seg==='critical')rows=rows.filter(r=>r.perf!==null&&r.perf<0.33);
  else if(seg==='poor')rows=rows.filter(r=>r.perf!==null&&r.perf>=0.33&&r.perf<0.5);
  else if(seg==='avg')rows=rows.filter(r=>r.perf!==null&&r.perf>=0.5&&r.perf<0.7);
  else if(seg==='good')rows=rows.filter(r=>r.perf!==null&&r.perf>=0.7&&r.perf<0.85);
  else if(seg==='elite')rows=rows.filter(r=>r.perf!==null&&r.perf>=0.85);
  if(sort==='perf_asc')rows.sort((a,b)=>(a.perf||0)-(b.perf||0));
  else if(sort==='perf_desc')rows.sort((a,b)=>(b.perf||0)-(a.perf||0));
  else if(sort==='orders')rows.sort((a,b)=>(b.orders||0)-(a.orders||0));
  else if(sort==='delay')rows.sort((a,b)=>(b.delay||0)-(a.delay||0));
  else if(sort==='bad')rows.sort((a,b)=>(b.bad||0)-(a.bad||0));
  const shown=rows.slice(0,100);
  const cnt=document.getElementById('ect');
  if(cnt)cnt.textContent=`عرض ${shown.length} من ${rows.length} سجل`;
  const tbody=document.getElementById('etbody');
  if(!tbody)return;
  const cols=[];
  if(c.has('id'))cols.push('id');if(c.has('name'))cols.push('name');
  if(c.has('city'))cols.push('city');if(c.has('store'))cols.push('store');
  // date removedif(c.hasOrders)cols.push('orders');
  if(c.hasPerf)cols.push('perf');if(c.hasDel)cols.push('del_pct');
  if(c.hasPickup)cols.push('pickup_pct');if(c.hasDelay)cols.push('delay');
  if(c.hasBad)cols.push('bad');if(c.hasCancel)cols.push('cancel');
  tbody.innerHTML=shown.map(r=>`<tr>
    ${cols.map(col=>{
      const v=r[col];
      if(col==='perf'||col==='del_pct'||col==='pickup_pct'||col==='cancel')return`<td>${v!==null?`<span class="pill ${pp(v)}">${pct(v)}</span>`:'—'}</td>`;
      if(col==='delay')return`<td class="${v>20?'r-txt':v>10?'a-txt':''}">${v!==null?v.toFixed(1)+' دق':'—'}</td>`;
      if(col==='bad')return`<td class="${v>=5?'r-txt':v>=3?'a-txt':''}">${v!==null?v.toFixed(1):'—'}</td>`;
      if(col==='name')return`<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${v||''}">${v||'—'}</td>`;
      return`<td style="color:var(--text)">${v||'—'}</td>`;
    }).join('')}
    <td>${r.perf<0.33?'<span class="pill r">خطر</span>':r.perf<0.5?'<span class="pill a">ضعيف</span>':r.perf>=0.85?'<span class="pill g">نخبة</span>':r.perf!==null?'<span class="pill x">عادي</span>':'<span class="pill x">—</span>'}</td>
  </tr>`).join('');
};

function capTable(rows,extraCols){
  if(!rows||!rows.length)return'<div class="empty" style="padding:16px">لا توجد سجلات</div>';
  const base=['id','name','city','store','orders'];
  const cols=[...base,...(extraCols||[])].filter((c,i,a)=>a.indexOf(c)===i);
  const labels={id:'المعرّف',name:'الاسم',city:'المدينة',store:'المتجر',orders:'طلبات',
    perf:'الأداء',pickup_pct:'استلام',del_pct:'توصيل',delay:'تأخير',bad:'أيام سيئة',handling:'وقت العميل',max_delay:'أقصى تأخير'};
  return`<div class="scroll-x" style="max-height:260px;overflow-y:auto"><table class="tbl"><thead><tr>
    ${cols.map(c=>`<th>${labels[c]||c}</th>`).join('')}<th>الحالة</th>
  </tr></thead><tbody>
  ${rows.slice(0,50).map(r=>`<tr>
    ${cols.map(col=>{
      const v=r[col];
      if(col==='perf'||col==='del_pct'||col==='pickup_pct')return`<td>${v!==null&&v!==undefined?`<span class="pill ${pp(v)}">${pct(v)}</span>`:'—'}</td>`;
      if(col==='delay'||col==='max_delay')return`<td class="${v>20?'r-txt':v>10?'a-txt':''}">${v!==null&&v!==undefined?v.toFixed(1)+' دق':'—'}</td>`;
      if(col==='bad')return`<td class="${v>=5?'r-txt':v>=3?'a-txt':''}">${v!==null&&v!==undefined?v.toFixed(1):'—'}</td>`;
      if(col==='handling')return`<td class="${v<0.5?'r-txt':''}">${v!==null&&v!==undefined?v.toFixed(2)+' دق':'—'}</td>`;
      if(col==='name')return`<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${v||''}">${v||'—'}</td>`;
      return`<td style="color:var(--text)">${v!==null&&v!==undefined&&v!==''?v:'—'}</td>`;
    }).join('')}
    <td>${r.perf!==null&&r.perf!==undefined?(r.perf<0.33?'<span class="pill r">خطر</span>':r.perf<0.5?'<span class="pill a">ضعيف</span>':r.perf>=0.85?'<span class="pill g">نخبة</span>':'<span class="pill x">عادي</span>'):'<span class="pill x">—</span>'}</td>
  </tr>`).join('')}
  </tbody></table></div>`;
}

function renderAlerts(c){
  // Build per-signal captain lists
  const signals=[];

  const f1=c.raw.filter(r=>r.pickup_pct!==null&&r.pickup_pct>=0.8&&r.del_pct===0&&r.orders>=5).sort((a,b)=>(b.orders||0)-(a.orders||0));
  const f2=c.raw.filter(r=>r.handling!==null&&r.handling<0.5&&r.orders>=5).sort((a,b)=>(b.orders||0)-(a.orders||0));
  const fZero=c.raw.filter(r=>r.del_pct===0).sort((a,b)=>(b.orders||0)-(a.orders||0));
  const fBad=c.raw.filter(r=>r.bad!==null&&r.bad>=5&&r.orders>=3).sort((a,b)=>b.bad-a.bad);
  const fCrit=c.raw.filter(r=>r.perf!==null&&r.perf<0.1&&r.orders>=3).sort((a,b)=>a.perf-b.perf);
  const fDelay=c.raw.filter(r=>r.max_delay!==null&&r.max_delay>90).sort((a,b)=>b.max_delay-a.max_delay);
  const fCancel=c.raw.filter(r=>r.cancel!==null&&r.cancel>0.2).sort((a,b)=>b.cancel-a.cancel);

  if(c.avgPerf!==null&&c.avgPerf<0.5)
    signals.push({type:'r',code:'PERF-LOW',title:`متوسط الأداء منخفض: ${pct(c.avgPerf)}`,desc:'الهدف فوق 70%.',rows:c.raw.filter(r=>r.perf!==null&&r.perf<0.5).sort((a,b)=>a.perf-b.perf),cols:['perf','del_pct','orders']});
  if(c.avgDel!==null&&c.avgDel<0.5)
    signals.push({type:'r',code:'DEL-LOW',title:`نسبة التوصيل: ${pct(c.avgDel)}`,desc:'أقل من النصف — مشكلة هيكلية في آخر ميل.',rows:[],cols:[]});
  if(f1.length)
    signals.push({type:'r',code:'FRAUD-1',title:`${f1.length} كابتن: استلام عالي + صفر توصيل`,desc:'احتمال تلاعب ممنهج — مراجعة فورية.',rows:f1,cols:['perf','pickup_pct','del_pct','orders','bad']});
  if(f2.length)
    signals.push({type:'a',code:'FRAUD-2',title:`${f2.length} كابتن: وقت تعامل مع العميل أقل من 30 ثانية`,desc:'توصيل وهمي محتمل.',rows:f2,cols:['perf','del_pct','handling','orders']});
  if(fZero.length)
    signals.push({type:'a',code:'ZERO-DEL',title:`${fZero.length} كابتن بصفر توصيل ناجح`,desc:`يشمل ${fZero.reduce((s,r)=>s+(r.orders||0),0)} طلب ضائع.`,rows:fZero,cols:['perf','pickup_pct','del_pct','orders']});
  if(fBad.length)
    signals.push({type:'a',code:'BAD-DAYS',title:`${fBad.length} كابتن بـ 5+ أيام سيئة`,desc:'أداء سيئ متكرر — تدريب أو إجراء تأديبي.',rows:fBad,cols:['perf','bad','orders','delay']});
  if(fCrit.length)
    signals.push({type:'r',code:'CRIT-ZERO',title:`${fCrit.length} كابتن بأداء أقل من 10%`,desc:'غياب تشغيلي كامل — تجميد فوري.',rows:fCrit,cols:['perf','pickup_pct','del_pct','orders','bad']});
  if(fDelay.length)
    signals.push({type:'a',code:'MAX-DELAY',title:`أقصى تأخير: ${c.maxDelay.toFixed(0)} دقيقة`,desc:'راجع GPS تلك الرحلة.',rows:fDelay,cols:['delay','max_delay','perf','orders']});
  if(fCancel.length)
    signals.push({type:'a',code:'HIGH-CANCEL',title:`${fCancel.length} كابتن بمعدل إلغاء فوق 20%`,desc:'يؤثر على رضا العميل.',rows:fCancel,cols:['cancel','perf','orders']});

  if(!signals.length)
    signals.push({type:'b',code:'OK',title:'لا تنبيهات حرجة',desc:'المؤشرات ضمن الحدود المقبولة.',rows:[],cols:[]});

  const panelsHtml=signals.map(sig=>`
    <div class="panel" style="margin-bottom:12px">
      <div class="ph">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="alert-badge ${sig.type}">${sig.code}</span>
          <div><div class="alert-title">${sig.title}</div><div class="alert-desc">${sig.desc}</div></div>
        </div>
        ${sig.rows.length?`<span class="info-chip">${sig.rows.length} سجل</span>`:''}
      </div>
      ${sig.rows.length?capTable(sig.rows,sig.cols):''}
    </div>`).join('');

  return panelsHtml+
    (c.suggestions.length?`<div class="panel"><div class="ph"><span class="pt">💡 اقتراحات التحسين التشغيلية</span></div>
    <div class="alerts">${c.suggestions.map((s,i)=>`<div class="alert-row"><span class="alert-badge b">#${i+1}</span><div><div class="alert-desc">${s}</div></div></div>`).join('')}</div></div>`:'');
}

function renderCompare(c,p){
  if(!p)return`<div class="panel"><div class="empty"><div style="font-size:36px;margin-bottom:10px">📅</div>ارفع ملف الفترة السابقة لتفعيل المقارنة</div></div>`;
  const pm={};p.cities.forEach(ci=>pm[ci.city]=ci);
  const movers=c.cities.map(ci=>{const prev=pm[ci.city];return{...ci,dp:prev&&ci.perf!==null&&prev.perf!==null?ci.perf-prev.perf:null};}).filter(x=>x.dp!==null).sort((a,b)=>b.dp-a.dp);
  const kpis=[];
  if(c.hasPerf&&c.avgPerf!==null&&p.avgPerf!==null)kpis.push({l:'الأداء',cv:pct(c.avgPerf),pv:pct(p.avgPerf),d:c.avgPerf-p.avgPerf,better:'up'});
  if(c.hasDel&&c.avgDel!==null&&p.avgDel!==null)kpis.push({l:'التوصيل',cv:pct(c.avgDel),pv:pct(p.avgDel),d:c.avgDel-p.avgDel,better:'up'});
  if(c.hasDelay&&c.avgDelay!==null&&p.avgDelay!==null)kpis.push({l:'التأخير',cv:c.avgDelay.toFixed(1)+' دق',pv:p.avgDelay.toFixed(1)+' دق',d:c.avgDelay-p.avgDelay,better:'dn'});
  if(c.hasPerf)kpis.push({l:'الإلغاء / zeroDel',cv:c.zeroDel,pv:p.zeroDel,d:c.zeroDel-p.zeroDel,better:'dn'});
  let out=`<div class="kpi-grid">${kpis.map(k=>{const good=k.better==='up'?k.d>0:k.d<0;return`<div class="kpi ${good?'g':'r'}"><div class="kpi-lbl">${k.l}</div><div class="kpi-val">${k.cv}</div><div class="kpi-sub ${good?'up':'dn'}">${k.d>0?'▲':'▼'} (كان ${k.pv})</div></div>`;}).join('')}</div>`;
  out+=`<div class="two" style="margin-top:12px">
    <div class="panel"><div class="ph"><span class="pt">🚀 أكثر المدن تحسناً</span></div><div class="pb">${movers.slice(0,7).map(ci=>`<div class="br"><span class="br-l">${ci.city}</span><div class="br-t"><div class="br-f" style="width:${(ci.perf*100).toFixed(0)}%;background:var(--green)"></div></div><span class="br-v g-txt">${pct(ci.perf)}</span><span class="br-d g-txt">▲${pct(ci.dp)}</span></div>`).join('')}</div></div>
    <div class="panel"><div class="ph"><span class="pt">📉 أكثر المدن تدهوراً</span></div><div class="pb">${[...movers].sort((a,b)=>a.dp-b.dp).slice(0,7).map(ci=>`<div class="br"><span class="br-l">${ci.city}</span><div class="br-t"><div class="br-f" style="width:${(ci.perf*100).toFixed(0)}%;background:var(--red)"></div></div><span class="br-v r-txt">${pct(ci.perf)}</span><span class="br-d r-txt">▼${pct(Math.abs(ci.dp))}</span></div>`).join('')}</div></div>
  </div>`;
  return out;
}

    <p>اسحب وأفلت أي ملف Excel أو CSV هنا.<br>النظام يكتشف الأعمدة تلقائياً ويبني الداشبورد فوراً<br>بدون الحاجة لتعديل أسماء الأعمدة.</p>
    <div style="font-size:11px;color:var(--text3)">يدعم: أداء الكباتن ، أداء المتاجر ، بيانات التوصيل ، أي شيت تشغيلي</div>
    <div class="btn-upload">📊 اختر ملفاً</div>

}

function handleFile(file,which){
  parseFile(file,info=>{
    window._pendingFile={fileInfo:info,which};
    if(which==='curr'){
      // auto-detect and go straight to mapping UI
      renderMapUI(info,'curr');
    } else {
      renderMapUI(info,'prev');
    }
  });
}

// ══════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════
document.getElementById('f-curr').onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0],'curr');};
document.getElementById('f-prev').onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0],'prev');};
window.sw=function(t){activeTab=t;renderDash();};

// ══════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════
window.toggleTheme=function(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.getElementById('td').className=isDark?'':'on';
  document.getElementById('tn').className=isDark?'on':'';
  localStorage.setItem('ops-theme',isDark?'dark':'light');
};
(function(){
  const s=localStorage.getItem('ops-theme');
  if(s==='light'){isDark=false;document.documentElement.setAttribute('data-theme','light');document.getElementById('td').className='on';document.getElementById('tn').className='';}
  else document.documentElement.setAttribute('data-theme','dark');
})();

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
renderWelcome();
</script>
